<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospera Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            prospera: { 50: '#f0fdf4', 100: '#dcfce7', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a' },
            surf: { 0: '#0f1117', 1: '#151821', 2: '#1e2230' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: ui-monospace, monospace; }
    .card { background: #151821; border: 1px solid #1e2230; border-radius: 0.5rem; }
    .badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-weight: 600; }
    .badge-green { background: #052e16; color: #4ade80; }
    .badge-red   { background: #2d0a0a; color: #f87171; }
    .badge-yellow { background: #1c1408; color: #fbbf24; }
    .badge-blue   { background: #0c1f3f; color: #60a5fa; }
    .oor { color: #fbbf24; }
    .in-range { color: #4ade80; }
    .pnl-pos { color: #4ade80; }
    .pnl-neg { color: #f87171; }
    .log-line { font-size: 0.7rem; color: #64748b; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.65rem; color: #475569; padding: 0.25rem 0.5rem; }
    td { padding: 0.35rem 0.5rem; font-size: 0.8rem; }
    tr:not(:last-child) td { border-bottom: 1px solid #1e2230; }
  </style>
</head>
<body class="min-h-screen p-4">
  <meta name="prospera-api-base" content="">
  <meta name="prospera-api-key" content="">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <span class="text-xl font-bold text-prospera-400">⬡ Prospera</span>
      <span class="text-sm text-slate-500">Dashboard</span>
    </div>
    <div class="flex items-center gap-2">
      <span id="agent-status" class="badge badge-green">●</span>
      <span id="agent-label" class="text-xs text-slate-400">Running</span>
      <span class="text-slate-600">|</span>
      <span id="provider" class="text-xs text-slate-400">—</span>
    </div>
  </div>

  <!-- TOP CARDS -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div class="card p-4">
      <div class="text-xs text-slate-500 mb-1">Exposure</div>
      <div id="exposure" class="text-2xl font-bold">—</div>
      <div class="text-xs text-slate-500 mt-1">
        <span id="sol-balance">—</span> SOL
        <span class="text-slate-600">|</span>
        <span id="positions-count">0</span>/<span id="max-positions">6</span> pos
      </div>
    </div>
    <div class="card p-4">
      <div class="text-xs text-slate-500 mb-1">PnL Today</div>
      <div id="pnl-today" class="text-2xl font-bold">—</div>
      <div class="text-xs text-slate-500 mt-1">
        Win Rate: <span id="win-rate">—</span>
        <span class="text-slate-600">|</span>
        Closed: <span id="total-closed">0</span>
      </div>
    </div>
  </div>

  <!-- POSITIONS -->
  <div class="card mb-4">
    <div class="px-4 py-2 border-b border-[#1e2230]">
      <span class="text-xs font-semibold text-slate-300">📋 Positions</span>
    </div>
    <div id="positions-empty" class="px-4 py-3 text-xs text-slate-500">No open positions</div>
    <div id="positions-table" class="hidden"></div>
  </div>

  <!-- LAST SCREENING -->
  <div class="card mb-4">
    <div class="px-4 py-2 border-b border-[#1e2230]">
      <span class="text-xs font-semibold text-slate-300">🔍 Last Screening</span>
      <span id="screening-time" class="float-right text-xs text-slate-500"></span>
    </div>
    <div id="screening-data" class="px-4 py-2 text-xs text-slate-400">
      <div class="grid grid-cols-3 gap-2">
        <div>Discovered: <span id="s-discovered" class="text-slate-200">—</span></div>
        <div>After Vol: <span id="s-aftervol" class="text-slate-200">—</span></div>
        <div>Meteora: <span id="s-meteora" class="text-slate-200">—</span></div>
        <div>Fib Passed: <span id="s-fib" class="text-slate-200">—</span></div>
      </div>
    </div>
    <div id="screening-candidates" class="px-4 pb-2"></div>
  </div>

  <!-- RECENT LOGS -->
  <div class="card mb-4">
    <div class="px-4 py-2 border-b border-[#1e2230] flex justify-between items-center">
      <span class="text-xs font-semibold text-slate-300">📜 Recent Logs</span>
      <button id="refresh-btn" onclick="fetchData()" class="text-xs text-prospera-400 hover:text-prospera-300 transition-colors">↻ Refresh</button>
    </div>
    <div id="logs" class="px-4 py-2 max-h-40 overflow-y-auto"></div>
  </div>

  <!-- LAST UPDATED -->
  <div class="text-center text-xs text-slate-600">
    Updated: <span id="last-updated">—</span> · Auto-refresh 30s
  </div>

<script>
(function() {
  // ── Config from meta tags or URL params ─────────────────────────────────────
  function resolveBase() {
    var m = document.querySelector('meta[name="prospera-api-base"]');
    if (m && m.content) return m.content;
    var u = new URL(location.href);
    if (u.searchParams.has('base')) return u.searchParams.get('base');
    return location.origin;
  }
  function resolveKey() {
    var m = document.querySelector('meta[name="prospera-api-key"]');
    if (m && m.content) return m.content;
    return new URL(location.href).searchParams.get('key') || '';
  }

  var BASE = resolveBase().replace(/\/$/, '');
  var KEY  = resolveKey();
  var API  = BASE + '/api/dashboard' + (KEY ? '?key=' + encodeURIComponent(KEY) : '');

  // ── Helpers ────────────────────────────────────────────────────────────────
  function pnlClass(v) {
    v = parseFloat(v);
    if (isNaN(v) || v === 0) return 'text-slate-400';
    return v > 0 ? 'pnl-pos' : 'pnl-neg';
  }
  function fmt(v, dec) {
    if (v === null || v === undefined) return '—';
    return parseFloat(v).toFixed(dec !== undefined ? dec : 2);
  }
  function fmtPct(v) {
    if (v === null || v === undefined) return '—';
    return (parseFloat(v) > 0 ? '+' : '') + parseFloat(v).toFixed(1) + '%';
  }
  function ago(ts) {
    if (!ts) return '—';
    var d = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
    if (d < 60) return d + 's ago';
    if (d < 3600) return Math.floor(d / 60) + 'm ago';
    return Math.floor(d / 3600) + 'h ago';
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render(data) {
    // Status
    document.getElementById('provider').textContent = data.activeProvider || '—';

    // Exposure card
    var ep = parseFloat(data.exposurePct);
    var epTxt = (isNaN(ep) ? '—' : ep + '%');
    document.getElementById('exposure').textContent = epTxt;
    document.getElementById('exposure').className = 'text-2xl font-bold ' + (ep > 60 ? 'text-red-400' : 'text-slate-100');
    document.getElementById('sol-balance').textContent = fmt(data.solBalance, 3);
    document.getElementById('positions-count').textContent = data.totalPositions;
    document.getElementById('max-positions').textContent = data.maxPositions;

    // PnL card
    var pt = fmtPct(data.pnlToday);
    document.getElementById('pnl-today').textContent = pt;
    document.getElementById('pnl-today').className = 'text-2xl font-bold ' + pnlClass(data.pnlToday);
    document.getElementById('win-rate').textContent = data.pnlStats && data.pnlStats.winRate != null ? data.pnlStats.winRate + '%' : '—';
    document.getElementById('total-closed').textContent = data.pnlStats ? data.pnlStats.totalClosed : 0;

    // Positions
    var posList = data.positions || [];
    if (posList.length === 0) {
      document.getElementById('positions-empty').classList.remove('hidden');
      document.getElementById('positions-table').classList.add('hidden');
    } else {
      document.getElementById('positions-empty').classList.add('hidden');
      var rows = '<table><thead><tr><th>Pair</th><th>PnL</th><th>Range</th><th>Fees</th><th>Action</th></tr></thead><tbody>';
      posList.forEach(function(p) {
        var oor = !p.in_range;
        var pnl = fmtPct(p.pnl_pct);
        var pnlCls = pnlClass(p.pnl_pct);
        var rangeCls = oor ? 'oor' : 'in-range';
        var rangeTxt = oor ? '⚠ OOR ' + (p.minutes_out_of_range || 0) + 'm' : '✓ IN';
        var fees = p.unclaimed_fees_usd > 0 ? '$' + fmt(p.unclaimed_fees_usd, 2) : '—';
        var actionCls = p.action === 'CLOSE' || p.action === 'CLAIM' ? 'badge-red' : p.action === 'ADD' ? 'badge-green' : 'badge-blue';
        var actionTxt = p.action || 'STAY';
        rows += '<tr>' +
          '<td class="font-medium text-slate-200">' + (p.pair || '?') + '</td>' +
          '<td class="' + pnlCls + ' font-semibold">' + pnl + '</td>' +
          '<td class="' + rangeCls + ' text-xs">' + rangeTxt + '</td>' +
          '<td class="text-slate-400 text-xs">' + fees + '</td>' +
          '<td><span class="badge ' + actionCls + '">' + actionTxt + '</span></td>' +
          '</tr>';
      });
      rows += '</tbody></table>';
      var tbl = document.getElementById('positions-table');
      tbl.innerHTML = rows;
      tbl.classList.remove('hidden');
    }

    // Screening
    var sr = data.lastScreeningReport || {};
    document.getElementById('screening-time').textContent = data.lastScreening ? ago(data.lastScreening) : '—';
    document.getElementById('s-discovered').textContent = sr.discovered !== undefined ? sr.discovered : '—';
    document.getElementById('s-aftervol').textContent = sr.afterVolume !== undefined ? sr.afterVolume : '—';
    document.getElementById('s-meteora').textContent = sr.meteoraPools !== undefined ? sr.meteoraPools : '—';
    document.getElementById('s-fib').textContent = sr.fibPassed !== undefined ? sr.fibPassed : '—';

    // Candidates
    var cand = sr.candidates || [];
    var candDiv = document.getElementById('screening-candidates');
    if (cand.length > 0) {
      var chtml = '';
      cand.slice(0, 5).forEach(function(c) {
        chtml += '<div class="flex justify-between items-center py-1 border-b border-[#1e2230] last:border-0">' +
          '<span class="text-xs text-slate-300">' + (c.name || c.symbol || '?') + '</span>' +
          '<span class="text-xs text-slate-500">$' + fmt(c.price, 6) + ' · $' + fmt(c.volume_1h, 0) + ' vol · TVL $' + fmt(c.tvl, 0) + '</span>' +
          '</div>';
      });
      candDiv.innerHTML = chtml;
    } else {
      candDiv.innerHTML = '<div class="text-xs text-slate-500 py-1">No candidates</div>';
    }

    // Agent status
    var cb = data.circuitState;
    var statusEl = document.getElementById('agent-status');
    var labelEl = document.getElementById('agent-label');
    if (cb && cb.isCircuitBroken) {
      statusEl.className = 'badge badge-yellow';
      statusEl.textContent = '●';
      labelEl.textContent = 'Paused';
      labelEl.className = 'text-xs text-yellow-400';
    } else {
      statusEl.className = 'badge badge-green';
      statusEl.textContent = '●';
      labelEl.textContent = 'Running';
      labelEl.className = 'text-xs text-slate-400';
    }

    // Logs
    var logsDiv = document.getElementById('logs');
    var logs = data.logs || [];
    if (logs.length === 0) {
      logsDiv.innerHTML = '<div class="log-line py-0.5">No logs</div>';
    } else {
      logsDiv.innerHTML = logs.slice(-10).map(function(l) {
        return '<div class="log-line py-0.5"><span class="text-slate-600">[' + (l.cat || '?') + ']</span> ' + escHtml(l.msg || '') + '</div>';
      }).join('');
    }

    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showError(msg) {
    document.getElementById('exposure').textContent = '!';
    document.getElementById('pnl-today').textContent = '!';
    console.error(msg);
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  window.fetchData = function() {
    fetch(API)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(render)
      .catch(function(e) { showError(e.message); });
  };

  // ── Boot ──────────────────────────────────────────────────────────────────
  fetchData();
  setInterval(fetchData, 30000);
})();
</script>
</body>
</html>
